{% extends "base.html" %}
{% block title %}Login | TablatoDrum{% endblock %}

{% block content %}
<section class="auth-section hero-animated">
    <div class="animated-hero-bg dash-bg"></div>
    <div class="auth-card glass-card">
        <div class="auth-icon">LOG</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to access your Groove Library</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary auth-btn">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register" target="_blank" rel="noopener">Create one</a></p>
    </div>
</section>
{% endblock %}
