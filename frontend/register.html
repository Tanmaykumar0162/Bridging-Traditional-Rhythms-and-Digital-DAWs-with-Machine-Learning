{% extends "base.html" %}
{% block title %}Register | TablatoDrum{% endblock %}

{% block content %}
<section class="auth-section hero-animated">
    <div class="animated-hero-bg dash-bg"></div>
    <div class="auth-card glass-card">
        <div class="auth-icon">NEW</div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Start building your personal Groove Library</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username (3+ chars)" required minlength="3" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password (4+ chars)" required minlength="4" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary auth-btn">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login" target="_blank" rel="noopener">Sign in</a></p>
    </div>
</section>
{% endblock %}
